databaseChangeLog:
  - changeSet:
      id: 1
      author: BulandaK
      changes:
        - createTable:
            tableName: producers
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(1000)

  - changeSet:
      id: 2
      author: BulandaK
      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: DECIMAL(19, 2)
              - column:
                  name: producer_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: producer_id
            referencedTableName: producers
            referencedColumnNames: id
            constraintName: fk_products_producer
            onDelete: CASCADE

  - changeSet:
      id: 3
      author: BulandaK
      changes:
        - createTable:
            tableName: product_attributes
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: attribute_key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: attribute_value
                  type: VARCHAR(1000)
              - column:
                  name: product_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: product_attributes
            baseColumnNames: product_id
            referencedTableName: products
            referencedColumnNames: id
            constraintName: fk_product_attributes_product
            onDelete: CASCADE